<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Special</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #faf8f4; color: #2a2520; }
      .auth-gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .auth-card { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
      .auth-logo { font-size: 28px; font-weight: 600; }
      .auth-tagline { color: #7a6e65; font-size: 15px; }
      .auth-btn { display: flex; align-items: center; gap: 10px; padding: 10px 20px; border: 1px solid #e8e2d8; border-radius: 8px; background: #fff; cursor: pointer; font-size: 15px; font-weight: 500; }
      .auth-btn:hover { border-color: #c17f47; }
      .auth-spinner { width: 28px; height: 28px; border: 3px solid #e8e2d8; border-top-color: #c17f47; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
